<div class="login-box">
  <div class="card card-outline card-primary">
    <div class="card-body">
      <div class="auth-copy">
        <span class="auth-eyebrow">Acceso</span>
        <h1>Inicia sesion</h1>
        <p>Administra partidos y equipos desde una interfaz simple y ligera.</p>
      </div>

      <form [formGroup]="frmLogin" (submit)="iniciarSesion()">
        <div class="input-group mb-3">
          <input type="text" class="form-control" placeholder="Usuario" formControlName="usuario">
        </div>

        <div class="input-group mb-3">
          <input type="password" class="form-control" placeholder="Contrasena" formControlName="password">
        </div>

        <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
      </form>

      <p class="mb-1 auth-link">
        <a [routerLink]="['/register']">Registro nuevo usuario</a>
      </p>
    </div>
  </div>
</div>
